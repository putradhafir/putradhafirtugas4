    <h2>3. Class Abstract</h2>

      <pre>
// Nama: Putra Dhafir Nashrullah
// Nim: 251410009
// Kelas: SI2A

abstract class Kendaraan {
  String? merk;  // Field concrete
  
  void start();  // Method abstract
  
  void stop() {  // Method concrete
    print('Kendaraan berhenti');
  }
}

class Mobil extends Kendaraan {
  @override
  void start() {
    print('Mobil ${merk ?? 'tanpa merk'} menyala');
  }
  
  // Optional: override method stop jika ingin perilaku berbeda
  @override
  void stop() {
    print('Mobil ${merk ?? 'tanpa merk'} berhenti');
  }
}

void main() {
  Mobil mobil1 = Mobil();
  mobil1.merk = 'Toyota';
  mobil1.start();  // Output: Mobil Toyota menyala
  mobil1.stop();   // Output: Mobil Toyota berhenti
  
  Mobil mobil2 = Mobil();
  mobil2.start();  // Output: Mobil tanpa merk menyala
  mobil2.stop();   // Output: Mobil tanpa merk berhenti
}

// Nama: Putra Dhafir Nashrullah
// Nim: 251410009
// Kelas: SI2A

abstract class Bentuk {
  double hitungLuas();
  double hitungKeliling();
  
  void info() {
    print('Luas: ${hitungLuas()}, Keliling: ${hitungKeliling()}');
  }
}

class Persegi implements Bentuk {
  double sisi;
  
  Persegi(this.sisi);
  
  @override
  double hitungLuas() => sisi * sisi;
  
  @override
  double hitungKeliling() => 4 * sisi;
  
  @override
  void info() {
    print('Persegi dengan sisi $sisi memiliki luas ${hitungLuas()} dan keliling ${hitungKeliling()}');
  }
}

class Lingkaran implements Bentuk {
  double radius;
  
  Lingkaran(this.radius);
  
  @override
  double hitungLuas() => 3.14 * radius * radius;
  
  @override
  double hitungKeliling() => 2 * 3.14 * radius;
  
  @override
  void info() {
    print('Lingkaran dengan radius $radius memiliki luas ${hitungLuas()} dan keliling ${hitungKeliling()}');
  }
}

void main() {
  Persegi persegi = Persegi(5);
  Lingkaran lingkaran = Lingkaran(7);
  
  persegi.info();
  lingkaran.info();
}

// Nama: Putra Dhafir Nashrullah

abstract class Pekerja {
  void bekerja();
  
  void istirahat() {
    print('Sedang istirahat...');
  }
  
  void info() {
    print('Ini adalah seorang pekerja');
  }
}

class Programmer implements Pekerja {
  String nama;
  String bahasaPemrograman;
  
  Programmer(this.nama, this.bahasaPemrograman);
  
  @override
  void bekerja() {
    print('$nama sedang coding dengan $bahasaPemrograman');
  }
  
  @override
  void istirahat() {
    print('$nama minum kopi sambil ngoding');
  }
  
  @override
  void info() {
    print('$nama adalah seorang Programmer');
  }
}

class Dokter implements Pekerja {
  String nama;
  String spesialis;
  
  Dokter(this.nama, this.spesialis);
  
  @override
  void bekerja() {
    print('$nama sedang memeriksa pasien $spesialis');
  }
  
  @override
  void istirahat() {
    print('$nama istirahat di ruang dokter');
  }
  
  @override
  void info() {
    print('$nama adalah seorang Dokter $spesialis');
  }
}

class Guru implements Pekerja {
  String nama;
  String mataPelajaran;
  
  Guru(this.nama, this.mataPelajaran);
  
  @override
  void bekerja() {
    print('$nama sedang mengajar $mataPelajaran');
  }
  
  @override
  void istirahat() {
    print('$nama istirahat di ruang guru');
  }
  
  @override
  void info() {
    print('$nama adalah seorang Guru $mataPelajaran');
  }
}

void main() {
  print('========== SOAL 1,2,3 ==========');
  
  List<Pekerja> daftarPekerja = [
    Programmer('Andi', 'Dart'),
    Dokter('Budi', 'Jantung'),
    Guru('Citra', 'Matematika'),
  ];
  
  for (var pekerja in daftarPekerja) {
    pekerja.info();
    pekerja.bekerja();
    pekerja.istirahat();
    print('---');
  }
}

class MathUtils {
  static int factorial(int n) {
    if (n < 0) throw ArgumentError('Tidak bisa menghitung faktorial bilangan negatif');
    if (n == 0 || n == 1) return 1;
    int hasil = 1;
    for (int i = 2; i <= n; i++) {
      hasil *= i;
    }
    return hasil;
  }
  
  static bool isPrima(int n) {
    if (n <= 1) return false;
    if (n == 2) return true;
    if (n % 2 == 0) return false;
    for (int i = 3; i * i <= n; i += 2) {
      if (n % i == 0) return false;
    }
    return true;
  }
  
  static double roundToDecimal(double value, int decimalPlaces) {
    double faktor = 1;
    for (int i = 0; i < decimalPlaces; i++) {
      faktor *= 10;
    }
    return (value * faktor).round() / faktor;
  }
  
  static int randomInt(int min, int max) {
    return min + (DateTime.now().millisecondsSinceEpoch % (max - min + 1));
  }
  
  static double randomDouble(double min, double max) {
    return min + (DateTime.now().millisecondsSinceEpoch % 10000) / 10000 * (max - min);
  }
  
  static double rataRata(List<double> angka) {
    if (angka.isEmpty) return 0;
    double sum = 0;
    for (var a in angka) {
      sum += a;
    }
    return sum / angka.length;
  }
  
  static double median(List<double> angka) {
    if (angka.isEmpty) return 0;
    List<double> sorted = List.from(angka)..sort();
    int tengah = sorted.length ~/ 2;
    if (sorted.length % 2 == 0) {
      return (sorted[tengah - 1] + sorted[tengah]) / 2;
    } else {
      return sorted[tengah];
    }
  }
}

void main() {
  print('========== SOAL 5 ==========');
  
  print('Factorial 5: ${MathUtils.factorial(5)}');
  print('Factorial 7: ${MathUtils.factorial(7)}');
  print('Apakah 17 prima? ${MathUtils.isPrima(17)}');
  print('Apakah 20 prima? ${MathUtils.isPrima(20)}');
  print('3.14159 ke 2 desimal: ${MathUtils.roundToDecimal(3.14159, 2)}');
  print('Random Int (1-10): ${MathUtils.randomInt(1, 10)}');
  print('Random Double (0-1): ${MathUtils.randomDouble(0, 1)}');
  
  List<double> nilai = [70, 85, 90, 75, 80, 95];
  print('List nilai: $nilai');
  print('Rata-rata: ${MathUtils.rataRata(nilai)}');
  print('Median: ${MathUtils.median(nilai)}');
}

abstract class MediaPlayer {
  void load(String file);
}

abstract class Playable {
  void play();
}

abstract class Pausable {
  void pause();
}

class AudioPlayer extends MediaPlayer implements Playable, Pausable {
  String? file;

  @override
  void load(String file) {
    this.file = file;
    print('Audio dimuat: $file');
  }

  @override
  void play() {
    print('Audio diputar');
  }

  @override
  void pause() {
    print('Audio dijeda');
  }
}

class VideoPlayer extends MediaPlayer implements Playable, Pausable {
  String? file;

  @override
  void load(String file) {
    this.file = file;
    print('Video dimuat: $file');
  }

  @override
  void play() {
    print('Video diputar');
  }

  @override
  void pause() {
    print('Video dijeda');
  }
}

void main() {
  List players = [
    AudioPlayer(),
    VideoPlayer(),
  ];

  for (var p in players) {
    p.load('file.mp3 / file.mp4');
  }

  if (p is Playable) {
    p.play();
  }

  if (p is Pausable) {
    p.pause();
  }

  print('---');
}
