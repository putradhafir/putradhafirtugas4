<style>
body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: linear-gradient(to bottom, #87CEEB, #EAF6FF);
}

.identitas {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1rem;
    border-bottom: 3px solid #1890ff;
}

h1 {
    text-align: center;
    color: #0050b3;
}

.program {
    background: white;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.run-btn {
    background: #1890ff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
}

.run-btn:hover {
    background: #0050b3;
}

.dart-iframe {
    display: none;
    width: 100%;
    height: 500px;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #1890ff;
}
</style>

<script>
function showDartPad(id) {
    let frame = document.getElementById(id);

    // toggle (klik lagi bisa tutup)
    if (frame.style.display === "block") {
        frame.style.display = "none";
    } else {
        frame.style.display = "block";
    }
}
</script>

</head>
